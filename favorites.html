<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos — AeroPedia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-96.svg" />
  <meta name="theme-color" content="#ffffff" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AeroPedia">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="description" content="Tus aeronaves militares favoritas guardadas en AeroPedia.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script>if(localStorage.getItem('aeropedia_theme')==='dark')document.documentElement.classList.add('dark-preload');</script>
</head>
<body class="page-body">

<div id="navContainer"></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <p class="page-hero-label">// Tu colección personal</p>
    <h1 class="page-hero-title">Aeronaves <span>Favoritas</span></h1>
    <p class="page-hero-sub">
      Las aeronaves que has marcado con ★ desde la galería principal.
      Guarda, compara y consulta tus modelos preferidos.
    </p>
  </div>
</div>

<main class="page-content">

  <!-- Toolbar -->
  <div id="favsToolbar" style="display:none;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div id="favsCountBadge" class="favs-count-badge">
      <i class="fas fa-star"></i>
      <span id="favsCountText">0 favoritos</span>
    </div>
    <input type="search" id="favsSearch" class="search-input" placeholder="Filtrar favoritos..." oninput="debounce(filterFavs, 300)" style="width:16rem">
    <select id="favsSortSelect" class="cat-select" onchange="filterFavs()">
      <option value="default">Orden guardado</option>
      <option value="name">Nombre A–Z</option>
      <option value="year_asc">Año ↑ (antiguo)</option>
      <option value="year_desc">Año ↓ (reciente)</option>
      <option value="speed">Velocidad ↓</option>
      <option value="type">Tipo</option>
    </select>
    <button class="nav-link" onclick="confirmClearAll()"
            style="margin-left:auto;border-color:#ef4444;color:#ef4444">
      <i class="fas fa-trash"></i> Limpiar todo
    </button>
  </div>

  <!-- Grid -->
  <div id="favsGrid" class="mini-grid"></div>

  <!-- Toast -->
  <div id="favsToast" style="
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
    background:var(--dark);color:#fff;padding:.7rem 1.25rem;border-radius:9999px;
    border:1px solid rgba(37,99,235,.4);font-family:var(--font-mono);font-size:.65rem;
    font-weight:700;z-index:99;white-space:nowrap;display:flex;align-items:center;gap:.5rem">
    <i class="fas fa-check-circle" style="color:#4ade80"></i>
    <span id="favsToastMsg">Favorito actualizado</span>
  </div>

</main>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/theme.js"></script>
<script src="js/pages.js"></script>
<script>
'use strict';
let allFavPlanes = [];

/* ── Renderizar ─────────────────────────────────────── */
function renderFavs(planes) {
  const grid    = document.getElementById('favsGrid');
  const toolbar = document.getElementById('favsToolbar');
  const countEl = document.getElementById('favsCountText');
  const total   = getFavs().length;

  if (total === 0) {
    toolbar.style.display = 'none';
    grid.innerHTML =
      `<div class="favs-empty">
        <i class="fas fa-star"></i>
        <p class="favs-empty-title">// Sin aeronaves guardadas</p>
        <p class="favs-empty-sub">Usa el botón ★ en las tarjetas de la galería para guardar tus favoritas aquí.</p>
        <button class="mini-btn-home" onclick="goHome()" style="margin-top:1.5rem;display:inline-flex;width:auto;padding:.6rem 1.5rem">
          <i class="fas fa-fighter-jet"></i> Ir a la galería
        </button>
      </div>`;
    return;
  }

  toolbar.style.display = 'flex';
  if (countEl) countEl.textContent = total + ' favorito' + (total !== 1 ? 's' : '');

  if (!planes.length) {
    grid.innerHTML =
      `<div class="favs-empty">
        <i class="fas fa-search"></i>
        <p class="favs-empty-title">// Sin resultados</p>
        <p class="favs-empty-sub">Ningún favorito coincide con el filtro actual.</p>
      </div>`;
    return;
  }

  grid.innerHTML = planes.map(p => buildAircraftCard(p)).join('');
}

/* ── Filtrar y ordenar ──────────────────────────────── */
function filterFavs() {
  const s      = (document.getElementById('favsSearch').value || '').toLowerCase();
  const sort   = document.getElementById('favsSortSelect').value;
  const favIds = getFavs();

  let planes = allFavPlanes.filter(p => favIds.includes(p.id));

  if (s) {
    planes = planes.filter(p =>
      p.name.toLowerCase().includes(s) || p.country.toLowerCase().includes(s) || p.type.toLowerCase().includes(s)
    );
  }

  switch (sort) {
    case 'name':      planes.sort((a,b) => a.name.localeCompare(b.name)); break;
    case 'year_asc':  planes.sort((a,b) => a.year  - b.year);  break;
    case 'year_desc': planes.sort((a,b) => b.year  - a.year);  break;
    case 'speed':     planes.sort((a,b) => b.speed - a.speed); break;
    case 'type':      planes.sort((a,b) => a.type.localeCompare(b.type)); break;
    default:          planes.sort((a,b) => favIds.indexOf(a.id) - favIds.indexOf(b.id));
  }

  renderFavs(planes);
}

/* ── Override toggleFavPage para esta página ─────────── */
const _origToggleFavPage = toggleFavPage;
// Sobrescribir para actualizar la vista al quitar favorito
window.toggleFavPage = id => {
  _origToggleFavPage(id);
  const removed = !isFav(id);
  showFavsToast(removed ? '★ Quitado de favoritos' : '★ Añadido a favoritos');
  if (removed) {
    const card = document.getElementById('mini-' + id);
    if (card) {
      card.style.transition = 'opacity .3s, transform .3s';
      card.style.opacity    = '0';
      card.style.transform  = 'scale(.95)';
      setTimeout(filterFavs, 320);
    }
  }
};

/* ── Limpiar todos ──────────────────────────────────── */
function confirmClearAll() {
  if (!confirm('¿Eliminar todos los favoritos? No se puede deshacer.')) return;
  saveFavs([]);
  filterFavs();
  showFavsToast('Todos los favoritos eliminados');
}

/* ── Toast ──────────────────────────────────────────── */
function showFavsToast(msg) {
  const toast = document.getElementById('favsToast');
  const msgEl = document.getElementById('favsToastMsg');
  if (!toast) return;
  if (msgEl) msgEl.textContent = msg;
  toast.style.opacity   = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    toast.style.opacity   = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2500);
}

/* ── Init ────────────────────────────────────────────── */
async function initFavoritesPage() {
  initTheme();
  document.getElementById('navContainer').innerHTML = buildNavBar('favorites');
  try {
    await loadData();
    allFavPlanes = aircraftDB.filter(p => getFavs().includes(p.id));
    filterFavs();
  } catch (e) {
    showLoadError('favsGrid', e);
  }
}

document.addEventListener('DOMContentLoaded', initFavoritesPage);
</script>
</body>
</html>

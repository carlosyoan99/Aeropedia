<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teatro de Operaciones — AeroPedia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-96.svg" />
  <meta name="theme-color" content="#ffffff" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AeroPedia">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="description" content="Explora los conflictos históricos de aviación militar y los aviones que participaron en cada teatro de operaciones.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script>if(localStorage.getItem('aeropedia_theme')==='dark')document.documentElement.classList.add('dark-preload');</script>
</head>
<body class="page-body">

<div id="navContainer"></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <p class="page-hero-label">// Historial de conflictos</p>
    <h1 class="page-hero-title">Teatro de <span>Operaciones</span></h1>
    <p class="page-hero-sub">
      Selecciona un conflicto para ver qué aeronaves participaron, sus especificaciones
      y su papel en ese teatro de guerra.
    </p>
  </div>
</div>

<main class="page-content">

  <!-- Grid de conflictos -->
  <section id="conflictsSection">
    <div id="conflictsGrid" class="theater-page-grid">
      <!-- Se rellena con JS -->
    </div>
  </section>

  <!-- Resultado: aviones del conflicto seleccionado -->
  <section id="resultSection" style="display:none">
    <div id="resultHeader" class="theater-result-header"></div>

    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
      <input type="search" id="theaterSearch" class="search-input" placeholder="Filtrar por nombre, país o tipo..." oninput="debounce(filterTheaterResults, 300)" style="width:18rem">
      <span id="theaterCount" style="font-family:var(--font-mono);font-size:.65rem;color:var(--text-3)"></span>
      <button class="nav-link" onclick="clearSelection()" style="margin-left:auto">
        <i class="fas fa-arrow-left"></i> Todos los conflictos
      </button>
    </div>

    <div id="theaterAircraftGrid" class="mini-grid"></div>
  </section>

</main>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/theme.js"></script>
<script src="js/pages.js"></script>
<script>
'use strict';
let selectedConflictId = null;
let theaterPlanes      = [];

/* ── Grid de conflictos ─────────────────────────────── */
function buildConflictsGrid() {
  const grid = document.getElementById('conflictsGrid');
  if (!grid) return;

  const entries = Object.entries(conflictsDB);
  if (!entries.length) {
    showLoadError('conflictsGrid', new Error('No se encontraron conflictos en la base de datos.'));
    return;
  }

  grid.innerHTML = entries.map(function([id, cf]) {
    const count = aircraftDB.filter(function(p) {
      return (p.conflicts || []).includes(id);
    }).length;
    const color = cf.color || '#2563eb';
    return '<button class="theater-cf-card" id="cfcard-' + id + '" data-id="' + id + '" ' +
      'onclick="selectConflict(\'' + id + '\')" style="--cf-color:' + color + '">' +
      '<div class="cf-page-head">' +
        '<span class="cf-page-flag">' + cf.flag + '</span>' +
        '<span class="cf-page-years mono">' + cf.years + '</span>' +
      '</div>' +
      '<p class="cf-page-label header-font" style="color:' + color + '">' + cf.label + '</p>' +
      '<p class="cf-page-desc">' + cf.desc + '</p>' +
      '<div class="cf-page-count">' +
        '<span class="cf-page-count-n mono" style="color:' + color + '">' + count + '</span>' +
        '<span class="cf-page-count-l">aeronave' + (count !== 1 ? 's' : '') + '</span>' +
      '</div>' +
    '</button>';
  }).join('');

  // Activar conflicto desde el hash de la URL (#wwii_europe)
  const hash = location.hash.replace('#', '').trim();
  if (hash && conflictsDB[hash]) selectConflict(hash);
}

/* ── Seleccionar conflicto ──────────────────────────── */
function selectConflict(id) {
  const cf = conflictsDB[id];
  if (!cf) return;
  selectedConflictId = id;

  document.querySelectorAll('.theater-cf-card').forEach(function(c) {
    c.classList.toggle('active', c.dataset.id === id);
  });

  const header = document.getElementById('resultHeader');
  if (header) {
    header.style.setProperty('--cf-color', cf.color);
    header.innerHTML =
      '<span class="theater-result-flag">' + cf.flag + '</span>' +
      '<div>' +
        '<p class="theater-result-title header-font" style="color:' + cf.color + '">' + cf.label + '</p>' +
        '<p class="theater-result-years mono">' + cf.years + '</p>' +
        '<p class="theater-result-desc">' + cf.desc + '</p>' +
      '</div>';
  }

  theaterPlanes = aircraftDB
    .filter(function(p) { return (p.conflicts || []).includes(id); })
    .sort(function(a, b) { return a.year - b.year; });

  const searchEl = document.getElementById('theaterSearch');
  if (searchEl) searchEl.value = '';

  renderTheaterAircraft(theaterPlanes);

  document.getElementById('conflictsSection').style.display = 'none';
  document.getElementById('resultSection').style.display    = 'block';

  // Actualizar URL sin recargar
  history.pushState({ conflict: id }, '', '#' + id);

  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Renderizar aviones del teatro ──────────────────── */
function renderTheaterAircraft(planes) {
  const grid    = document.getElementById('theaterAircraftGrid');
  const countEl = document.getElementById('theaterCount');

  if (!planes.length) {
    grid.innerHTML =
      '<div class="theater-empty" style="grid-column:1/-1">' +
        '<i class="fas fa-satellite-dish"></i>' +
        '<p>Ninguna aeronave registrada en este conflicto</p>' +
      '</div>';
    if (countEl) countEl.textContent = '0 aeronaves';
    return;
  }

  if (countEl) countEl.textContent = planes.length + ' aeronave' + (planes.length !== 1 ? 's' : '');
  grid.innerHTML = planes.map(p => buildAircraftCard(p)).join('');
}

/* ── Filtro de búsqueda dentro del conflicto ─────────── */
function filterTheaterResults() {
  const s = (document.getElementById('theaterSearch').value || '').toLowerCase();
  const filtered = s
    ? theaterPlanes.filter(p => 
        p.name.toLowerCase().includes(s) || p.country.toLowerCase().includes(s) || p.type.toLowerCase().includes(s)
      )
    : theaterPlanes;
  renderTheaterAircraft(filtered);
}

/* ── Volver al grid de conflictos ────────────────────── */
function clearSelection() {
  selectedConflictId = null;
  document.querySelectorAll('.theater-cf-card').forEach(function(c) {
    c.classList.remove('active');
  });
  document.getElementById('conflictsSection').style.display = 'block';
  document.getElementById('resultSection').style.display    = 'none';
  history.pushState(null, '', location.pathname);
  document.getElementById('conflictsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Botón Atrás del navegador ───────────────────────── */
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.conflict) {
    selectConflict(e.state.conflict);
  } else {
    // Volver al grid de conflictos sin añadir historial
    selectedConflictId = null;
    document.getElementById('conflictsSection').style.display = 'block';
    document.getElementById('resultSection').style.display    = 'none';
  }
});

/* ── Init ────────────────────────────────────────────── */
async function initTheaterPage() {
  initTheme();
  document.getElementById('navContainer').innerHTML = buildNavBar('theater');
  try {
    await loadData();
    buildConflictsGrid();
  } catch (e) {
    showLoadError('conflictsGrid', e);
  }
}

document.addEventListener('DOMContentLoaded', initTheaterPage);
</script>
</body>
</html>
